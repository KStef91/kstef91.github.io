<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 뉴스</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 28px 20px;
      background: white;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    h1 { margin: 0; font-size: 28px; }
    .sub { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      margin-top: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    label {
      display: block;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    input[type="text"], textarea, input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      background: white;
    }
    textarea { min-height: 120px; resize: vertical; }
    input[type="file"] { margin-top: 6px; }
    button {
      margin-top: 14px;
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #111827;
    }
    .post {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      background: white;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .thumb {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid var(--line);
    }
    .comment-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .comment {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; }
    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .hidden { display: none; }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap" style="padding:0 16px;">
      <h1>📰 가족 뉴스</h1>
      <div class="sub">글, 사진 업로드와 댓글 기능이 들어간 첫 버전</div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section>
        <div id="posts"></div>
      </section>

      <aside>
        <div class="card">
          <h2 style="margin-top:0;">관리자 로그인</h2>
          <label for="adminPassword">비밀번호</label>
          <input id="adminPassword" type="password" placeholder="관리자 비밀번호" />
          <button id="loginBtn" class="secondary">로그인</button>
          <div id="loginStatus" class="status">로그인 전에는 글 작성이 잠겨 있습니다.</div>
        </div>

        <div class="card" id="editorCard">
          <h2 style="margin-top:0;">새 글 올리기</h2>
          <label for="title">제목</label>
          <input id="title" type="text" placeholder="예: 4월 가족 소식" />

          <label for="content">내용</label>
          <textarea id="content" placeholder="가족 뉴스 내용을 적어주세요"></textarea>

          <label for="image">사진</label>
          <input id="image" type="file" accept="image/*" />

          <button id="publishBtn">업로드</button>
          <div id="publishStatus" class="status"></div>
        </div>
      </aside>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // 1) 여기에 Supabase 정보를 넣으세요.
    const SUPABASE_URL = 'https://hmnlvsnmyvxydaytfisv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtbmx2c25teXZ4eWRheXRmaXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjYzMjQsImV4cCI6MjA5MTMwMjMyNH0.tHEoce4zErDPgl0jKz6EORrGxWAi0k5tYBrkGgZu4IE';

    // 2) 매우 간단한 관리자 잠금용 비밀번호입니다.
    // 실제 운영 전에는 Supabase Auth로 바꾸는 것을 권장합니다.
    const ADMIN_PASSWORD = 'family1234';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const postsEl = document.getElementById('posts');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');
    const publishBtn = document.getElementById('publishBtn');
    const publishStatus = document.getElementById('publishStatus');
    const editorCard = document.getElementById('editorCard');

    let isAdmin = false;

    loginBtn.addEventListener('click', () => {
      const pwd = document.getElementById('adminPassword').value;
      if (pwd === ADMIN_PASSWORD) {
        isAdmin = true;
        loginStatus.textContent = '관리자 로그인 성공';
      } else {
        isAdmin = false;
        loginStatus.textContent = '비밀번호가 올바르지 않습니다.';
      }
    });

    async function loadPosts() {
      postsEl.innerHTML = '<div class="card">불러오는 중...</div>';
      const { data: posts, error } = await supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        postsEl.innerHTML = `<div class="card">에러: ${error.message}</div>`;
        return;
      }

      if (!posts || posts.length === 0) {
        postsEl.innerHTML = '<div class="card">아직 글이 없습니다.</div>';
        return;
      }

      postsEl.innerHTML = '';
      for (const post of posts) {
        const wrapper = document.createElement('article');
        wrapper.className = 'post';
        wrapper.innerHTML = `
          <h2 style="margin:0 0 8px 0;">${escapeHtml(post.title)}</h2>
          <div class="meta">${new Date(post.created_at).toLocaleString('ko-KR')}</div>
          <div>${escapeHtml(post.content).replace(/\n/g, '<br>')}</div>
          ${post.image_url ? `<img class="thumb" src="${post.image_url}" alt="업로드 이미지">` : ''}
          <div class="comment-box">
            <h3 style="margin:0 0 10px 0; font-size:16px;">댓글</h3>
            <div id="comments-${post.id}">불러오는 중...</div>
            <div class="row" style="margin-top:10px;">
              <input type="text" id="author-${post.id}" placeholder="이름">
              <input type="text" id="comment-${post.id}" placeholder="댓글을 남겨보세요">
            </div>
            <button data-post-id="${post.id}" class="commentBtn">댓글 작성</button>
          </div>
        `;
        postsEl.appendChild(wrapper);
        await loadComments(post.id);
      }

      document.querySelectorAll('.commentBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const postId = e.target.dataset.postId;
          const author = document.getElementById(`author-${postId}`).value.trim();
          const content = document.getElementById(`comment-${postId}`).value.trim();
          if (!author || !content) {
            alert('이름과 댓글을 모두 입력해주세요.');
            return;
          }
          const { error } = await supabase.from('comments').insert([{ post_id: postId, author, content }]);
          if (error) {
            alert('댓글 저장 실패: ' + error.message);
            return;
          }
          document.getElementById(`comment-${postId}`).value = '';
          await loadComments(postId);
        });
      });
    }

    async function loadComments(postId) {
      const box = document.getElementById(`comments-${postId}`);
      const { data, error } = await supabase
        .from('comments')
        .select('*')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });

      if (error) {
        box.innerHTML = `<div class="status">댓글 에러: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        box.innerHTML = '<div class="status">첫 댓글을 남겨보세요.</div>';
        return;
      }

      box.innerHTML = data.map(c => `
        <div class="comment">
          <strong>${escapeHtml(c.author)}</strong><br>
          <span>${escapeHtml(c.content)}</span>
        </div>
      `).join('');
    }

    publishBtn.addEventListener('click', async () => {
      if (!isAdmin) {
        publishStatus.textContent = '먼저 관리자 로그인 해주세요.';
        return;
      }

      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const imageFile = document.getElementById('image').files[0];

      if (!title || !content) {
        publishStatus.textContent = '제목과 내용을 입력해주세요.';
        return;
      }

      publishStatus.textContent = '업로드 중...';
      let imageUrl = null;

      if (imageFile) {
        const filePath = `uploads/${Date.now()}-${imageFile.name}`;
        const { error: uploadError } = await supabase.storage
          .from('family-news')
          .upload(filePath, imageFile, { upsert: false });

        if (uploadError) {
          publishStatus.textContent = '이미지 업로드 실패: ' + uploadError.message;
          return;
        }

        const { data } = supabase.storage.from('family-news').getPublicUrl(filePath);
        imageUrl = data.publicUrl;
      }

      const { error } = await supabase.from('posts').insert([{ title, content, image_url: imageUrl }]);
      if (error) {
        publishStatus.textContent = '글 저장 실패: ' + error.message;
        return;
      }

      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('image').value = '';
      publishStatus.textContent = '업로드 완료';
      await loadPosts();
    });

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadPosts();
  </script>
</body>
</html>
