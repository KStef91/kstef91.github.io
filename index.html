<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 뉴스</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent2: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 24px 20px;
      background: white;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    h1 { margin: 0; font-size: 28px; }
    .sub { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      margin-top: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"], input[type="password"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      background: white;
    }
    textarea { min-height: 120px; resize: vertical; }
    input[type="file"] { margin-top: 6px; }
    button {
      margin-top: 14px;
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: var(--accent2); }
    button.light {
      background: #eef2ff;
      color: #1e3a8a;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .post {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      background: white;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .thumb {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid var(--line);
    }
    .comment-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .comment {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; }
    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .hidden { display: none; }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #eef2ff;
      color: #1d4ed8;
      font-weight: 700;
    }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
      .row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap" style="padding:0 16px;">
      <h1>📰 가족 뉴스</h1>
      <div class="sub">가족 계정으로 로그인하고 글, 사진, 댓글을 남기는 버전</div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section>
        <div id="posts"></div>
      </section>

      <aside>
        <div class="card">
          <h2 style="margin-top:0;">계정</h2>
          <div class="badge">Supabase Auth</div>

          <div id="signedOutView">
            <label for="email">이메일</label>
            <input id="email" type="email" placeholder="family@example.com" autocomplete="email" />

            <label for="password">비밀번호</label>
            <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" />

            <div class="actions">
              <button id="signInBtn">로그인</button>
              <button id="signUpBtn" class="secondary">회원가입</button>
            </div>
            <div id="authStatus" class="status">가족 계정으로 로그인하거나 새 계정을 만들 수 있습니다.</div>
          </div>

          <div id="signedInView" style="display:none;">
            <div class="status" style="margin-top:14px;">
              <strong id="accountName">로그인됨</strong><br>
              <span id="accountEmail"></span>
            </div>
            <div id="accountRole" class="status"></div>
            <div class="actions">
              <button id="signOutBtn" class="light">로그아웃</button>
            </div>
          </div>
        </div>

        <div class="card" id="profileCard" style="display:none;">
          <h2 style="margin-top:0;">내 프로필</h2>
          <label for="displayName">표시 이름</label>
          <input id="displayName" type="text" placeholder="예: 엄마, 아빠, 민수" />
          <button id="saveProfileBtn">프로필 저장</button>
          <div id="profileStatus" class="status">댓글과 글 작성자 이름에 표시됩니다.</div>
        </div>

        <div class="card" id="editorCard">
          <h2 style="margin-top:0;">새 글 올리기</h2>
          <label for="title">제목</label>
          <input id="title" type="text" placeholder="예: 4월 가족 소식" />

          <label for="content">내용</label>
          <textarea id="content" placeholder="가족 뉴스 내용을 적어주세요"></textarea>

          <label for="image">사진</label>
          <input id="image" type="file" accept="image/*" />

          <button id="publishBtn">업로드</button>
          <div id="publishStatus" class="status"></div>
        </div>
      </aside>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://hmnlvsnmyvxydaytfisv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtbmx2c25teXZ4eWRheXRmaXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjYzMjQsImV4cCI6MjA5MTMwMjMyNH0.tHEoce4zErDPgl0jKz6EORrGxWAi0k5tYBrkGgZu4IE';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const postsEl = document.getElementById('posts');
    const authStatus = document.getElementById('authStatus');
    const publishStatus = document.getElementById('publishStatus');
    const editorCard = document.getElementById('editorCard');
    const signUpBtn = document.getElementById('signUpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const signedOutView = document.getElementById('signedOutView');
    const signedInView = document.getElementById('signedInView');
    const accountName = document.getElementById('accountName');
    const accountEmail = document.getElementById('accountEmail');
    const accountRole = document.getElementById('accountRole');
    const publishBtn = document.getElementById('publishBtn');
    const profileCard = document.getElementById('profileCard');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const profileStatus = document.getElementById('profileStatus');

    let currentUser = null;
    let currentProfile = null;
    let editingPostId = null;
    let editingCommentId = null;

    signUpBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) {
        authStatus.textContent = '이메일과 비밀번호를 입력해주세요.';
        return;
      }

      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) {
        authStatus.textContent = '회원가입 실패: ' + error.message;
        return;
      }

      document.getElementById('password').value = '';
      authStatus.textContent = data.session
        ? '회원가입과 동시에 로그인되었습니다.'
        : '회원가입 완료. 이메일 인증을 켠 경우 메일함에서 인증 후 로그인해주세요.';

      await refreshAuthState();
    });

    signInBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) {
        authStatus.textContent = '이메일과 비밀번호를 입력해주세요.';
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        authStatus.textContent = '로그인 실패: ' + error.message;
        return;
      }

      document.getElementById('password').value = '';
      await refreshAuthState();
      await loadPosts();
    });

    signOutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      await refreshAuthState();
      await loadPosts();
    });

    supabase.auth.onAuthStateChange(async () => {
      await refreshAuthState();
      await loadPosts();
    });
    let currentUser = null;
    let currentProfile = null;
    let authReady = false;
    
    async function refreshAuthState() {
      const {
        data: { session },
        error: sessionError
      } = await supabase.auth.getSession();
    
      console.log('SESSION ON LOAD:', session);
      console.log('SESSION ERROR:', sessionError);
    
      let resolvedUser = session?.user ?? null;
    
      if (!resolvedUser) {
        const { data: userData, error: userError } = await supabase.auth.getUser();
        console.log('GET USER:', userData);
        console.log('GET USER ERROR:', userError);
        resolvedUser = userData?.user ?? null;
      }
    
      currentUser = resolvedUser;
    
      if (!currentUser) {
        currentProfile = null;
        editorCard.style.display = 'none';
        profileCard.style.display = 'none';
        signedOutView.style.display = 'block';
        signedInView.style.display = 'none';
        document.getElementById('password').value = '';
        authStatus.textContent = '가족 계정으로 로그인하거나 새 계정을 만들 수 있습니다.';
        authReady = true;
        return;
      }
    
      const { data: profile, error: profileError } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .maybeSingle();
    
      console.log('PROFILE:', profile);
      console.log('PROFILE ERROR:', profileError);
    
      currentProfile = profile ?? {
        id: currentUser.id,
        email: currentUser.email,
        display_name: '',
        can_post: false
      };
    
      const canPost = currentProfile?.can_post === true;
    
      editorCard.style.display = canPost ? 'block' : 'none';
      profileCard.style.display = 'block';
      signedOutView.style.display = 'none';
      signedInView.style.display = 'block';
    
      document.getElementById('displayName').value = currentProfile?.display_name || '';
      accountName.textContent = currentProfile?.display_name || '가족 계정';
      accountEmail.textContent = currentUser.email || '';
      accountRole.textContent = canPost
        ? '이 계정은 글 작성과 댓글 작성이 가능합니다.'
        : '이 계정은 댓글 작성이 가능합니다.';
    
      authReady = true;
    }

    async function loadPosts() {
      postsEl.innerHTML = '<div class="card">불러오는 중...</div>';
    
      const { data: posts, error } = await supabase
        .from('posts')
        .select('id, created_at, title, content, image_url, author_id')
        .order('created_at', { ascending: false });
    
      if (error) {
        postsEl.innerHTML = `<div class="card">에러: ${error.message}</div>`;
        return;
      }
    
      if (!posts || posts.length === 0) {
        postsEl.innerHTML = '<div class="card">아직 글이 없습니다.</div>';
        return;
      }
    
      const authorIds = [...new Set(posts.map(p => p.author_id).filter(Boolean))];
    
      let profileMap = {};
    
      if (authorIds.length > 0) {
        const { data: profileRows, error: profileRowsError } = await supabase
          .from('profiles')
          .select('id, display_name')
          .in('id', authorIds);
      
        console.log('POST AUTHOR PROFILE ERROR:', profileRowsError);
      
        profileMap = Object.fromEntries(
          (profileRows || []).map(p => [p.id, p.display_name || '가족'])
        );
      }
    
      postsEl.innerHTML = '';
    
      for (const post of posts) {
        const isOwnPost = currentUser && post.author_id === currentUser.id;
        const authorName = profileMap[post.author_id] || '가족';
    
        const wrapper = document.createElement('article');
        wrapper.className = 'post';
        wrapper.innerHTML = `
          <h2 style="margin:0 0 8px 0;">${escapeHtml(post.title)}</h2>
          <div class="meta">${new Date(post.created_at).toLocaleString('ko-KR')} · 작성자: ${escapeHtml(authorName)}</div>
          <div>${escapeHtml(post.content).split('\n').join('<br>')}</div>
          ${post.image_url ? `<img class="thumb" src="${post.image_url}" alt="업로드 이미지">` : ''}
          ${isOwnPost ? `
            <div class="actions" style="margin-top:12px;">
              <button data-post-id="${post.id}" class="editPostBtn light">글 수정</button>
              <button data-post-id="${post.id}" data-image-url="${post.image_url || ''}" class="deletePostBtn secondary">글 삭제</button>
            </div>
            <div id="edit-post-box-${post.id}" class="card hidden" style="margin-top:12px; padding:14px;">
              <label for="edit-title-${post.id}">제목</label>
              <input type="text" id="edit-title-${post.id}" value="${escapeAttr(post.title)}">
              <label for="edit-content-${post.id}">내용</label>
              <textarea id="edit-content-${post.id}">${escapeHtml(post.content)}</textarea>
              <label for="edit-image-${post.id}">새 사진으로 교체</label>
              <input type="file" id="edit-image-${post.id}" accept="image/*">
              <div class="status">새 이미지를 선택하지 않으면 기존 이미지를 유지합니다.</div>
              <div class="actions">
                <button data-post-id="${post.id}" data-current-image="${post.image_url || ''}" class="savePostBtn">저장</button>
                <button data-post-id="${post.id}" class="cancelPostBtn secondary">취소</button>
              </div>
            </div>
          ` : ''}
          <div class="comment-box">
            <h3 style="margin:0 0 10px 0; font-size:16px;">댓글</h3>
            <div id="comments-${post.id}">불러오는 중...</div>
            ${currentUser ? `
              <div class="row" style="margin-top:10px;">
                <input type="text" id="comment-${post.id}" placeholder="댓글을 남겨보세요">
              </div>
              <button data-post-id="${post.id}" class="commentBtn">댓글 작성</button>
            ` : `<div class="status">댓글을 쓰려면 로그인해주세요.</div>`}
          </div>
        `;
    
        postsEl.appendChild(wrapper);
        await loadComments(post.id);
      }
    
      document.querySelectorAll('.commentBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const postId = Number(e.target.dataset.postId);
          const content = document.getElementById(`comment-${postId}`).value.trim();
    
          if (!content) {
            alert('댓글을 입력해주세요.');
            return;
          }
    
          const { error } = await supabase.from('comments').insert([
            {
              post_id: postId,
              content,
              author_id: currentUser.id
            }
          ]);
    
          if (error) {
            alert('댓글 저장 실패: ' + error.message);
            return;
          }
    
          document.getElementById(`comment-${postId}`).value = '';
          await loadComments(postId);
        });
      });
    
      document.querySelectorAll('.editPostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const postId = Number(e.target.dataset.postId);
          document.querySelectorAll('[id^="edit-post-box-"]').forEach(box => box.classList.add('hidden'));
          document.getElementById(`edit-post-box-${postId}`)?.classList.remove('hidden');
          editingPostId = postId;
        });
      });
    
      document.querySelectorAll('.cancelPostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const postId = Number(e.target.dataset.postId);
          document.getElementById(`edit-post-box-${postId}`)?.classList.add('hidden');
          if (editingPostId === postId) editingPostId = null;
        });
      });
    
      document.querySelectorAll('.savePostBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const postId = Number(e.target.dataset.postId);
          const currentImage = e.target.dataset.currentImage || null;
          const title = document.getElementById(`edit-title-${postId}`).value.trim();
          const content = document.getElementById(`edit-content-${postId}`).value.trim();
          const newImageFile = document.getElementById(`edit-image-${postId}`).files[0];
    
          if (!title || !content) {
            alert('제목과 내용을 모두 입력해주세요.');
            return;
          }
    
          let imageUrl = currentImage;
    
          if (newImageFile) {
            const safeName = sanitizeFileName(newImageFile.name);
            const filePath = `${currentUser.id}/${Date.now()}-${safeName}`;
    
            const { error: uploadError } = await supabase.storage
              .from('family-news')
              .upload(filePath, newImageFile, { upsert: false });
    
            if (uploadError) {
              alert('새 이미지 업로드 실패: ' + uploadError.message);
              return;
            }
    
            const { data } = supabase.storage.from('family-news').getPublicUrl(filePath);
            imageUrl = data.publicUrl;
          }
    
          const { error } = await supabase
            .from('posts')
            .update({ title, content, image_url: imageUrl })
            .eq('id', postId)
            .eq('author_id', currentUser.id);
    
          if (error) {
            alert('글 수정 실패: ' + error.message);
            return;
          }
    
          editingPostId = null;
          await loadPosts();
        });
      });
    
      document.querySelectorAll('.deletePostBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const postId = Number(e.target.dataset.postId);
          const imageUrl = e.target.dataset.imageUrl || '';
          const ok = confirm('이 글을 삭제할까요? 연결된 댓글도 함께 삭제됩니다.');
          if (!ok) return;
    
          if (imageUrl) {
            const marker = '/storage/v1/object/public/family-news/';
            const idx = imageUrl.indexOf(marker);
            if (idx !== -1) {
              const filePath = decodeURIComponent(imageUrl.slice(idx + marker.length));
              await supabase.storage.from('family-news').remove([filePath]);
            }
          }
    
          const { error } = await supabase
            .from('posts')
            .delete()
            .eq('id', postId)
            .eq('author_id', currentUser.id);
    
          if (error) {
            alert('글 삭제 실패: ' + error.message);
            return;
          }
    
          await loadPosts();
        });
      });
    }
    

    async function loadComments(postId) {
      const box = document.getElementById(`comments-${postId}`);
      const { data, error } = await supabase
        .from('comments')
        .select('id, created_at, content, author_id')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });

      if (error) {
        box.innerHTML = `<div class="status">댓글 에러: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        box.innerHTML = '<div class="status">첫 댓글을 남겨보세요.</div>';
        return;
      }

      box.innerHTML = data.map(c => {
        const name = c.profiles?.display_name || '가족';
        const isOwnComment = currentUser && c.author_id === currentUser.id;
        return `
          <div class="comment">
            <strong>${escapeHtml(name)}</strong>
            <div class="meta">${new Date(c.created_at).toLocaleString('ko-KR')}</div>
            <div id="comment-view-${c.id}">${escapeHtml(c.content)}</div>
            ${isOwnComment ? `
              <div class="actions" style="margin-top:8px;">
                <button data-comment-id="${c.id}" data-post-id="${postId}" class="editCommentBtn light">댓글 수정</button>
                <button data-comment-id="${c.id}" data-post-id="${postId}" class="deleteCommentBtn secondary">댓글 삭제</button>
              </div>
              <div id="edit-comment-box-${c.id}" class="hidden" style="margin-top:8px;">
                <input type="text" id="edit-comment-input-${c.id}" value="${escapeAttr(c.content)}">
                <div class="actions">
                  <button data-comment-id="${c.id}" data-post-id="${postId}" class="saveCommentBtn">저장</button>
                  <button data-comment-id="${c.id}" class="cancelCommentBtn secondary">취소</button>
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      box.querySelectorAll('.editCommentBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const commentId = Number(e.target.dataset.commentId);
          box.querySelectorAll('[id^="edit-comment-box-"]').forEach(el => el.classList.add('hidden'));
          document.getElementById(`edit-comment-box-${commentId}`)?.classList.remove('hidden');
          editingCommentId = commentId;
        });
      });

      box.querySelectorAll('.cancelCommentBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const commentId = Number(e.target.dataset.commentId);
          document.getElementById(`edit-comment-box-${commentId}`)?.classList.add('hidden');
          if (editingCommentId === commentId) editingCommentId = null;
        });
      });

      box.querySelectorAll('.saveCommentBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const commentId = Number(e.target.dataset.commentId);
          const postIdFromBtn = Number(e.target.dataset.postId);
          const content = document.getElementById(`edit-comment-input-${commentId}`).value.trim();
          if (!content) {
            alert('댓글 내용을 입력해주세요.');
            return;
          }

          const { error } = await supabase
            .from('comments')
            .update({ content })
            .eq('id', commentId)
            .eq('author_id', currentUser.id);

          if (error) {
            alert('댓글 수정 실패: ' + error.message);
            return;
          }

          editingCommentId = null;
          await loadComments(postIdFromBtn);
        });
      });

      box.querySelectorAll('.deleteCommentBtn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const commentId = Number(e.target.dataset.commentId);
          const postIdFromBtn = Number(e.target.dataset.postId);
          const ok = confirm('이 댓글을 삭제할까요?');
          if (!ok) return;

          const { error } = await supabase
            .from('comments')
            .delete()
            .eq('id', commentId)
            .eq('author_id', currentUser.id);

          if (error) {
            alert('댓글 삭제 실패: ' + error.message);
            return;
          }

          await loadComments(postIdFromBtn);
        });
      });
    }

    publishBtn.addEventListener('click', async () => {
      if (!currentUser || currentProfile?.can_post !== true) {
        publishStatus.textContent = '글 작성 권한이 있는 가족 계정으로 로그인해주세요.';
        return;
      }

      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const imageFile = document.getElementById('image').files[0];

      if (!title || !content) {
        publishStatus.textContent = '제목과 내용을 입력해주세요.';
        return;
      }

      publishStatus.textContent = '업로드 중...';
      let imageUrl = null;

      if (imageFile) {
        const safeName = imageFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const filePath = `${currentUser.id}/${Date.now()}-${safeName}`;
        const { error: uploadError } = await supabase.storage
          .from('family-news')
          .upload(filePath, imageFile, { upsert: false });

        if (uploadError) {
          publishStatus.textContent = '이미지 업로드 실패: ' + uploadError.message;
          return;
        }

        const { data } = supabase.storage.from('family-news').getPublicUrl(filePath);
        imageUrl = data.publicUrl;
      }

      const { error } = await supabase.from('posts').insert([
        { title, content, image_url: imageUrl, author_id: currentUser.id }
      ]);

      if (error) {
        publishStatus.textContent = '글 저장 실패: ' + error.message;
        return;
      }

      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('image').value = '';
      publishStatus.textContent = '업로드 완료';
      await loadPosts();
    });

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str) {
      return escapeHtml(str).replaceAll('\n', '&#10;');
    }

    saveProfileBtn.addEventListener('click', async () => {
      if (!currentUser) {
        profileStatus.textContent = '먼저 로그인해주세요.';
        return;
      }

      const displayName = document.getElementById('displayName').value.trim();
      if (!displayName) {
        profileStatus.textContent = '표시 이름을 입력해주세요.';
        return;
      }

      const { error } = await supabase
        .from('profiles')
        .upsert({
          id: currentUser.id,
          email: currentUser.email,
          display_name: displayName
        });

      if (error) {
        profileStatus.textContent = '프로필 저장 실패: ' + error.message;
        return;
      }

      profileStatus.textContent = '프로필 저장 완료';
      await refreshAuthState();
      await loadPosts();
    });

    function sanitizeFileName(name) {
      return Array.from(String(name)).map(ch => {
        const allowed = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789._-';
        return allowed.includes(ch) ? ch : '_';
      }).join('');
    }

    window.addEventListener('load', async () => {
      authStatus.textContent = '계정 상태를 확인하는 중...';
      await refreshAuthState();
      await loadPosts();
    });
    
    supabase.auth.onAuthStateChange(async (_event, session) => {
      console.log('AUTH STATE CHANGE:', _event, session);
      currentUser = session?.user ?? null;
      await refreshAuthState();
      await loadPosts();
    });
    
  </script>
</body>
</html>
